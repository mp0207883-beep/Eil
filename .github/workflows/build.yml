name: Build Elite IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List all files in the repository
        run: find . -maxdepth 3 -name "*.xcodeproj" -o -name "*.xcworkspace"
